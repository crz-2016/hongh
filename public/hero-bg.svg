<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1"/>
      <stop offset="30%" style="stop-color:#DDA0DD"/>
      <stop offset="60%" style="stop-color:#B19CD9"/>
      <stop offset="100%" style="stop-color:#9370DB"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="80%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- 渐变天空 -->
  <rect width="1920" height="1080" fill="url(#skyGrad)"/>
  
  <!-- 夕阳光晕 -->
  <ellipse cx="1600" cy="200" rx="500" ry="400" fill="url(#sunGrad)"/>
  
  <!-- 云朵 -->
  <g fill="#fff" opacity="0.6">
    <ellipse cx="200" cy="150" rx="80" ry="40"/>
    <ellipse cx="260" cy="140" rx="60" ry="35"/>
    <ellipse cx="150" cy="160" rx="50" ry="30"/>
    
    <ellipse cx="600" cy="100" rx="100" ry="50"/>
    <ellipse cx="680" cy="90" rx="70" ry="40"/>
    <ellipse cx="540" cy="110" rx="60" ry="35"/>
    
    <ellipse cx="1200" cy="180" rx="90" ry="45"/>
    <ellipse cx="1280" cy="170" rx="65" ry="38"/>
    <ellipse cx="1140" cy="190" rx="55" ry="32"/>
  </g>
  
  <!-- 漂浮的心形 -->
  <g fill="#FF69B4" opacity="0.5">
    <path transform="translate(100, 300) scale(0.8)" d="M30 10 C30 5 25 0 20 0 C10 0 10 10 10 10 C10 10 10 20 20 30 C30 20 30 10 30 10"/>
    <path transform="translate(300, 200) scale(0.6)" d="M30 10 C30 5 25 0 20 0 C10 0 10 10 10 10 C10 10 10 20 20 30 C30 20 30 10 30 10"/>
    <path transform="translate(500, 400) scale(0.7)" d="M30 10 C30 5 25 0 20 0 C10 0 10 10 10 10 C10 10 10 20 20 30 C30 20 30 10 30 10"/>
    <path transform="translate(1500, 250) scale(0.9)" d="M30 10 C30 5 25 0 20 0 C10 0 10 10 10 10 C10 10 10 20 20 30 C30 20 30 10 30 10"/>
    <path transform="translate(1700, 450) scale(0.5)" d="M30 10 C30 5 25 0 20 0 C10 0 10 10 10 10 C10 10 10 20 20 30 C30 20 30 10 30 10"/>
    <path transform="translate(800, 150) scale(0.4)" d="M30 10 C30 5 25 0 20 0 C10 0 10 10 10 10 C10 10 10 20 20 30 C30 20 30 10 30 10"/>
    <path transform="translate(1100, 350) scale(0.65)" d="M30 10 C30 5 25 0 20 0 C10 0 10 10 10 10 C10 10 10 20 20 30 C30 20 30 10 30 10"/>
  </g>
  
  <!-- 漂浮的小爱心 -->
  <g fill="#FFB6C1" opacity="0.7">
    <circle cx="250" cy="500" r="8"/>
    <circle cx="450" cy="300" r="6"/>
    <circle cx="700" cy="550" r="10"/>
    <circle cx="1000" cy="280" r="7"/>
    <circle cx="1300" cy="480" r="9"/>
    <circle cx="1600" cy="350" r="8"/>
  </g>
  
  <!-- 底部装饰 -->
  <ellipse cx="960" cy="1200" rx="1200" ry="400" fill="#FF69B4" opacity="0.3"/>
</svg>
